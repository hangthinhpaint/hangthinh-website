<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hang Thinh Co., Ltd | Paint Vietnam</title>

<meta name="description" content="Hang Thinh Co., Ltd - Paint distributor in Vietnam offering interior, exterior, waterproof and industrial coatings.">
<meta name="keywords" content="paint Vietnam, Biên Hòa paint, industrial paint, waterproof paint">

<style>

body{
margin:0;
font-family:Arial;
background:#f5f7fa;
}

/* HEADER */
header{
background:linear-gradient(135deg,#0D2F6F,#D62828);
color:white;
text-align:center;
padding:40px 20px;
}

.logo{width:120px;}

.banner{
width:90%;
max-width:900px;
border-radius:12px;
margin-top:10px;
}

/* NAV */
nav{
background:#0D2F6F;
padding:10px;
text-align:center;
position:sticky;
top:0;
z-index:1000;
}

nav a{
color:white;
margin:0 10px;
text-decoration:none;
font-weight:bold;
}

/* PRODUCTS */
.section{
max-width:1100px;
margin:auto;
padding:40px 20px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
cursor:pointer;
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

.card h3{margin:10px;}
.card p{margin:0 10px 10px;color:#666;}

/* CONTACT */
.contact-box{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
max-width:800px;
margin:auto;
}

input,textarea{
width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#0D2F6F;
color:white;
padding:12px;
width:100%;
border:none;
cursor:pointer;
border-radius:6px;
}

/* FLOATING BUTTONS */
.floating{
position:fixed;
right:15px;
bottom:15px;
display:flex;
flex-direction:column;
gap:12px;
z-index:9999;
}

.floating a{
display:flex;
align-items:center;
justify-content:center;
gap:8px;
padding:14px 16px;
border-radius:50px;
color:white;
text-decoration:none;
font-weight:bold;
min-width:160px;
box-shadow:0 6px 15px rgba(0,0,0,0.25);
transition:0.2s;
}

.floating a:hover{
transform:scale(1.05);
}

.whatsapp{background:#25D366;}
.zalo{background:#0068FF;}
.facebook{background:#1877F2;}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:20px;
border-radius:10px;
width:90%;
max-width:400px;
}

</style>
</head>

<body>

<nav>
<a href="#products">Products</a>
<a href="#contact">Contact</a>
</nav>

<header>
<img src="logo.png" class="logo">
<h1>HANG THINH CO., LTD</h1>
<p>Trusted Paint Distributor in Vietnam</p>
<img src="banner.jpeg" class="banner">
</header>

<section class="section" id="products">

<h2>Our Paint Products</h2>

<div class="products">

<div class="card" onclick="openProduct('Interior Paint','HT-IP-001')">
<img src="WhatsApp Image 2026-06-10 at 19.14.39.jpeg">
<h3>Interior Paint</h3>
<p>HT-IP-001</p>
</div>

<div class="card" onclick="openProduct('Exterior Paint','HT-EP-002')">
<img src="WhatsApp Image 2026-06-10 at 19.14.39 (2).jpeg">
<h3>Exterior Paint</h3>
<p>HT-EP-002</p>
</div>

<div class="card" onclick="openProduct('Waterproof Paint','HT-WP-003')">
<img src="WhatsApp Image 2026-06-10 at 19.14.39 (1).jpeg">
<h3>Waterproof Paint</h3>
<p>HT-WP-003</p>
</div>

</div>

</section>

<section class="section" id="contact">

<h2>Contact Us</h2>

<div class="contact-box">

<p>📍 Biên Hòa, Đồng Nai</p>
<p>📞 0971 339 722</p>

<h3>Request Quote</h3>

<form onsubmit="send(event)">
<input id="name" placeholder="Name" required>
<input id="phone" placeholder="Phone" required>
<textarea id="msg" placeholder="Message" required></textarea>
<button type="submit">Send via WhatsApp</button>
</form>

</div>

</section>

<!-- FLOATING BUTTONS -->
<div class="floating">

<a class="whatsapp" href="https://wa.me/84971339722" target="_blank">
💬 WhatsApp
</a>

<a class="zalo" href="https://zalo.me/84971339722" target="_blank">
🇻🇳 Zalo
</a>

<a class="facebook" href="https://m.me/yourPageUsername" target="_blank">
📘 Messenger
</a>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<h3 id="pname"></h3>
<p id="pcode"></p>
<button onclick="order()">Order Now</button>
<button onclick="closeModal()">Close</button>
</div>
</div>

<script>

let currentProduct="";

function openProduct(name,code){
currentProduct=name+" - "+code;
document.getElementById("pname").innerText=name;
document.getElementById("pcode").innerText=code;
document.getElementById("modal").style.display="flex";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

function order(){
window.open("https://wa.me/84971339722?text=I want "+currentProduct);
}

function send(e){
e.preventDefault();

let n=document.getElementById("name").value;
let p=document.getElementById("phone").value;
let m=document.getElementById("msg").value;

let text="Name: "+n+"%0APhone: "+p+"%0AMessage: "+m;

window.open("https://wa.me/84971339722?text="+text);
}

</script>

</body>
</html>
