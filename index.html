<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hang Thinh Co., Ltd | Paint Vietnam - Interior & Industrial Coatings</title>

<meta name="description" content="Hang Thinh Co., Ltd is a professional paint distributor in Vietnam offering interior, exterior, waterproof and industrial coatings. Request a quote today.">
<meta name="keywords" content="paint Vietnam, Biên Hòa paint, interior paint Vietnam, exterior paint, industrial paint, waterproof coating Vietnam">

<meta property="og:title" content="Hang Thinh Co., Ltd - Paint Vietnam">
<meta property="og:description" content="Professional paint distributor in Vietnam">
<meta property="og:type" content="website">

<style>

/* RESET */
body{
margin:0;
font-family:Arial;
background:#f4f6f8;
color:#222;
}

/* TOP BAR */
.topbar{
background:#0D2F6F;
color:white;
padding:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.lang button{
background:white;
border:none;
padding:5px 10px;
margin-left:5px;
cursor:pointer;
border-radius:5px;
}

/* HERO */
.hero{
background:linear-gradient(135deg,#0D2F6F,#D62828);
color:white;
text-align:center;
padding:60px 20px;
}

.hero h1{
font-size:40px;
}

.hero p{
max-width:700px;
margin:auto;
}

/* BUTTON */
.btn{
background:white;
color:#D62828;
padding:12px 20px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
padding:40px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
cursor:pointer;
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

.card h3{
margin:10px;
}

.card p{
margin:0 10px 10px;
color:#666;
}

/* CONTACT */
.contact{
background:white;
padding:40px;
max-width:800px;
margin:auto;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

input,textarea{
width:100%;
padding:10px;
margin:8px 0;
}

button{
background:#0D2F6F;
color:white;
padding:12px;
border:none;
width:100%;
cursor:pointer;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:20px;
border-radius:10px;
width:90%;
max-width:400px;
}

</style>
</head>

<body>

<!-- TOP -->
<div class="topbar">
<div>Hang Thinh Co., Ltd</div>
<div class="lang">
<button onclick="setLang('en')">EN</button>
<button onclick="setLang('vn')">VN</button>
</div>
</div>

<!-- HERO -->
<div class="hero">
<h1 id="title">Professional Paint Solutions</h1>
<p id="desc">Interior, Exterior & Industrial Coatings in Vietnam</p>
<button class="btn" onclick="scrollToContact()">Request Quote</button>
</div>

<!-- PRODUCTS -->
<div class="products">

<div class="card" onclick="openProduct('Interior Paint','HT-IP-001','WhatsApp Image 2026-06-10 at 19.14.39.jpeg')">
<img src="WhatsApp Image 2026-06-10 at 19.14.39.jpeg">
<h3>Interior Paint</h3>
<p>HT-IP-001</p>
</div>

<div class="card" onclick="openProduct('Exterior Paint','HT-EP-002','WhatsApp Image 2026-06-10 at 19.14.39 (2).jpeg')">
<img src="WhatsApp Image 2026-06-10 at 19.14.39 (2).jpeg">
<h3>Exterior Paint</h3>
<p>HT-EP-002</p>
</div>

<div class="card" onclick="openProduct('Waterproof Paint','HT-WP-003','WhatsApp Image 2026-06-10 at 19.14.39 (1).jpeg')">
<img src="WhatsApp Image 2026-06-10 at 19.14.39 (1).jpeg">
<h3>Waterproof Paint</h3>
<p>HT-WP-003</p>
</div>

</div>

<!-- CONTACT -->
<div class="contact" id="contact">
<h2 id="contactTitle">Request Quote</h2>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<textarea id="msg" placeholder="Message"></textarea>

<button onclick="send()">Send via WhatsApp</button>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<h3 id="pname"></h3>
<p id="pcode"></p>
<button onclick="order()">Order Now</button>
<button onclick="closeModal()">Close</button>
</div>
</div>

<script>

let currentProduct="";

function openProduct(name,code,img){
currentProduct=name+" - "+code;
document.getElementById("pname").innerText=name;
document.getElementById("pcode").innerText=code;
document.getElementById("modal").style.display="flex";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

function order(){
window.open("https://wa.me/84971339722?text=I want "+currentProduct);
}

function send(){
let n=document.getElementById("name").value;
let p=document.getElementById("phone").value;
let m=document.getElementById("msg").value;

let text="Name:"+n+"%0APhone:"+p+"%0AMessage:"+m;

window.open("https://wa.me/84971339722?text="+text);
}

/* LANGUAGE */
function setLang(lang){
if(lang==="vn"){
document.getElementById("title").innerText="Giải pháp sơn chuyên nghiệp";
document.getElementById("desc").innerText="Sơn nội thất, ngoại thất và công nghiệp tại Việt Nam";
document.getElementById("contactTitle").innerText="Yêu cầu báo giá";
}else{
document.getElementById("title").innerText="Professional Paint Solutions";
document.getElementById("desc").innerText="Interior, Exterior & Industrial Coatings in Vietnam";
document.getElementById("contactTitle").innerText="Request Quote";
}
}

function scrollToContact(){
document.getElementById("contact").scrollIntoView({behavior:"smooth"});
}

</script>

</body>
</html>
